<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dreamtides Quest</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="status-bar">
    <span id="status-essence">Essence: —</span>
    <span id="status-completion">Completion: —</span>
    <span id="status-deck">Deck: —</span>
    <span id="status-dreamcaller"></span>
  </div>

  <div id="main">
    <div id="left-panel">
      <pre id="context"></pre>
      <div id="options-wrapper">
        <ul id="options" role="listbox" aria-label="Options"></ul>
        <div id="action-bar"></div>
      </div>
    </div>

    <div id="deck-sidebar" class="hidden">
      <div id="sidebar-header">
        <span>Deck</span>
      </div>
      <ul id="deck-list"></ul>
    </div>
  </div>

  <button id="deck-toggle" aria-label="Toggle deck sidebar">Deck ▶</button>

  <div id="game-over" class="hidden">
    <h2>Quest Complete</h2>
    <p id="game-over-message"></p>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
