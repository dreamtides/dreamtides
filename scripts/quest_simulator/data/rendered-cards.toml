[metadata]
schema_version = 1

[metadata.table_style]
color_scheme = "blue_light"

[[metadata.validation_rules]]
column = "card-type"
type = "enum"
enum = ["Character", "Event"]

[[metadata.validation_rules]]
column = "rarity"
type = "enum"
enum = ["Common", "Uncommon", "Rare", "Legendary", "Special"]

[[metadata.validation_rules]]
column = "subtype"
type = "enum"
enum = ["Agent", "Ancient", "Avatar", "Child", "Detective", "Enigma", "Explorer", "Guide", "Hacker", "Mage", "Monster", "Musician", "Outsider", "Renegade", "Robot", "Spirit Animal", "Super", "Survivor", "Synth", "Tinkerer", "Trooper", "Visionary", "Visitor", "Warrior"]

[[metadata.validation_rules]]
column = "resonance"
type = "enum"
enum = ["Ruin", "Tide", "Stone", "Ember", "Zephyr"]
colors = ["#E8D0F0", "#D0E4F5", "#D5F0D0", "#F5D0D0", "#F5EED0"]

[[metadata.derived_columns]]
name = "image"
function = "image_derived"
position = 0
width = 160
inputs = ["image_number"]
url_template = "https://www.shutterstock.com/image-illustration/-260nw-{image_number}.jpg"
frozen = true

[[metadata.derived_columns]]
name = "rules preview"
function = "rules_preview"
position = 6
width = 300
inputs = ["rules-text", "variables"]

[metadata.rows]
default_height = 100
frozen_rows = 1

[[metadata.columns]]
key = "name"
width = 200
bold = true

[[metadata.columns]]
key = "rules-text"
width = 275

[[metadata.columns]]
key = "id"
width = 140

[[metadata.columns]]
key = "preview"
width = 250

[[metadata.columns]]
key = "card-type"
width = 150

[[metadata.columns]]
key = "subtype"
width = 200

[[metadata.columns]]
key = "rarity"
width = 125

[[metadata.columns]]
key = "resonance"
width = 150
